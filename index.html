<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            transition: .2s;
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 650px;
            padding: 10px;
        }

        .card {
            border-radius: 12px;
        }

        .answer-input {
            display: none;
        }

        .answer-label {
            cursor: pointer;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            display: block;
            transition: .15s;
            word-break: break-word;
        }

        .answer-label:hover {
            background: #f1f3f5;
        }

        .answer-input:checked+.answer-label {
            border-color: #0d6efd;
            background: #e7f1ff;
        }

        .correct {
            background: #198754 !important;
            color: white;
            border-color: #198754;
        }

        .wrong {
            background: #dc3545 !important;
            color: white;
            border-color: #dc3545;
        }

        .show-correct {
            background: #ffc107 !important;
            color: #000;
            border-color: #ffc107;
        }

        /* DARK MODE */
        .dark {
            background: #121212 !important;
            color: #eee;
        }

        .dark .card {
            background: #1e1e1e;
            color: #eee;
        }

        .dark .text-muted {
            color: #aaa !important;
        }

        .dark .answer-label {
            background: #242424;
            border-color: #555;
            color: #eee;
        }

        .dark .answer-label:hover {
            background: #333;
        }

        .dark .answer-input:checked+.answer-label {
            background: #243b63;
            border-color: #6ea8fe;
        }

        .dark .form-control,
        .dark .form-select {
            background: #242424;
            color: #eee;
            border-color: #555;
        }

        .dark .form-control::placeholder {
            color: #aaa;
        }

        .dark .form-select option {
            background: #242424;
            color: #eee;
        }

        .dark .list-group-item {
            background: #1e1e1e;
            color: #eee;
            border-color: #555;
        }

        .dark .btn-outline-secondary {
            color: #eee;
            border-color: #777;
        }

        /* HORNÍ LIŠTA */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .top-actions {
            display: flex;
            gap: 6px;
        }

        .test-header-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
        }

        /* TOASTY */
        #toastContainer {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1080;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 90vw;
        }

        .app-toast {
            min-width: 280px;
            max-width: 380px;
            overflow: hidden;
            border-radius: 10px;
        }

        .toast-progress-wrap {
            height: 3px;
            background: rgba(0, 0, 0, .1);
        }

        .toast-progress {
            height: 100%;
            width: 100%;
            transition: width linear;
        }

        .dark .toast-progress-wrap {
            background: rgba(255, 255, 255, .15);
        }

        /* MOBIL */
        @media(max-width:576px) {
            body {
                align-items: flex-start !important;
                padding-top: 10px;
            }

            #app {
                padding: 5px;
            }

            .card-body {
                padding: 12px !important;
            }

            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .top-actions {
                width: 100%;
                flex-direction: column;
            }

            .top-actions button {
                width: 100%;
                justify-content: center;
            }

            #topicBadge {
                width: 100%;
                text-align: center;
            }

            h5 {
                font-size: 17px;
            }

            .answer-label {
                font-size: 15px;
                padding: 14px 12px;
            }
        }
    </style>
</head>

<body class="bg-light d-flex align-items-center justify-content-center py-3">

    <div id="toastContainer"></div>

    <div id="app" class="container">

        <!-- NAHRÁNÍ JSON -->
        <div id="uploadPanel" class="card shadow-sm">
            <div class="card-body text-center p-4">
                <i class="bi bi-file-earmark-arrow-up fs-1"></i>
                <h5 class="mt-2">Načíst otázky</h5>
                <p class="text-muted small">Vyber JSON soubor s otázkami</p>
                <input id="fileInput" type="file" accept=".json" class="form-control">
            </div>
        </div>

        <!-- TEST -->
        <div id="testPanel" class="d-none">

            <div class="card shadow-sm mb-2">
                <div class="card-body">
                    <div class="top-bar">
                        <span id="topicBadge" class="badge text-bg-primary">Téma</span>

                        <div class="top-actions">
                            <button id="showAnswersBtn" class="btn btn-sm btn-outline-primary">Správné odpovědi</button>
                            <button id="themeBtn" class="btn btn-sm btn-outline-secondary"><i
                                    class="bi bi-moon"></i></button>
                        </div>
                    </div>

                    <select id="topicSelect" class="form-select mt-3">
                        <option value="all"> Všechna témata</option>
                    </select>

                    <div class="test-header-info mt-2">
                        <div id="metadata" class="small">
                        </div>

                        <div id="info" class="small fw-bold text-end">
                        </div>
                    </div>

                    <div class="progress mt-2" style="height:8px">
                        <div id="progress" class="progress-bar"></div>
                    </div>

                    <div id="stats" class="small mt-2"></div>

                </div>
            </div>

            <div id="questionBox"></div>
        </div>

        <!-- SPRÁVNÉ ODPOVĚDI -->
        <div id="answersPanel" class="d-none">

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Správné odpovědi</h5>
                        <button id="backBtn" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i>
                            Zpět
                        </button>
                    </div>

                    <input id="answerSearch" type="search" class="form-control mt-3" placeholder="Hledat otázku...">

                    <div id="answersList" class="mt-3">

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let questions = [];
        let currentQuestion = null;
        let totalQuestions = 0;
        let number = 0;
        let correct = 0;
        let wrong = 0;

        const fileInput = document.getElementById("fileInput");
        const uploadPanel = document.getElementById("uploadPanel");
        const testPanel = document.getElementById("testPanel");
        const answersPanel = document.getElementById("answersPanel");
        const topicSelect = document.getElementById("topicSelect");
        const topicBadge = document.getElementById("topicBadge");
        const questionBox = document.getElementById("questionBox");
        const metadata = document.getElementById("metadata");
        const stats = document.getElementById("stats");
        const progress = document.getElementById("progress");
        const themeBtn = document.getElementById("themeBtn");
        const showAnswersBtn = document.getElementById("showAnswersBtn");
        const answersList = document.getElementById("answersList");
        const backBtn = document.getElementById("backBtn");
        const answerSearch = document.getElementById("answerSearch");
        const toastContainer = document.getElementById("toastContainer");

        // ZOBRAZENÍ TOASTU
        function showToast(message, type = "danger", duration = 5000) {
            let meta = {
                danger: { icon: "bi-exclamation-octagon-fill", title: "Chyba" },
                warning: { icon: "bi-exclamation-triangle-fill", title: "Upozornění" },
                success: { icon: "bi-check-circle-fill", title: "Hotovo" },
                info: { icon: "bi-info-circle-fill", title: "Info" }
            }[type] || { icon: "bi-exclamation-octagon-fill", title: "Chyba" };

            let toast = document.createElement("div");
            toast.className = "toast app-toast border-0 show";
            toast.setAttribute("role", "alert");
            toast.innerHTML = `
                <div class="toast-header text-bg-${type} border-0">
                    <i class="bi ${meta.icon} me-2"></i>
                    <strong class="me-auto">${meta.title}</strong>
                    <button type="button" class="btn-close btn-close-white"></button>
                </div>
                <div class="toast-body">${message}</div>
                <div class="toast-progress-wrap">
                    <div class="toast-progress bg-${type}"></div>
                </div>
            `;

            let progress = toast.querySelector(".toast-progress");
            let timer = setTimeout(() => toast.remove(), duration);

            toast.querySelector(".btn-close").onclick = () => {
                clearTimeout(timer);
                toast.remove();
            };

            toastContainer.appendChild(toast);

            progress.style.transitionDuration = duration + "ms";
            requestAnimationFrame(() => requestAnimationFrame(() => {
                progress.style.width = "0%";
            }));
        }

        // VALIDACE STRUKTURY JSON
        function validateQuestionsData(data) {
            if (Array.isArray(data) || typeof data !== "object" || data === null) {
                return { type: "warning", message: "Soubor má neplatný formát." };
            }

            if (!Array.isArray(data.questions) || data.questions.length === 0) {
                return { type: "warning", message: "Soubor neobsahuje žádné otázky." };
            }

            let requiredFields = ["topic", "question", "A", "B", "C", "correct"];

            let isValidQuestion = q =>
                typeof q === "object" && q !== null &&
                requiredFields.every(field => q[field] !== undefined && q[field] !== null && q[field] !== "") &&
                ["A", "B", "C"].includes(q.correct);

            if (!data.questions.every(isValidQuestion)) {
                return { type: "warning", message: "Některé otázky mají neúplný nebo neplatný formát." };
            }

            return null;
        }

        // NAČTENÍ JSON
        fileInput.addEventListener("change", e => {
            let file = e.target.files[0];

            if (!file) return;

            if (!file.name.toLowerCase().endsWith(".json")) {
                showToast("Vyber prosím soubor ve formátu .json.", "warning");
                fileInput.value = "";
                return;
            }

            let reader = new FileReader();

            reader.onload = x => {
                let data;

                try {
                    data = JSON.parse(x.target.result);
                } catch (err) {
                    showToast("Soubor se nepodařilo načíst.", "danger");
                    fileInput.value = "";
                    return;
                }

                let error = validateQuestionsData(data);

                if (error) {
                    showToast(error.message, error.type);
                    fileInput.value = "";
                    return;
                }

                allQuestions = data.questions;

                showMetadata(data);
                loadTopics();

                uploadPanel.classList.add("d-none");
                testPanel.classList.remove("d-none");

                startTest();
                showToast("Otázky byly úspěšně načteny.", "success");
            };

            reader.onerror = () => {
                showToast("Soubor se nepodařilo přečíst.", "danger");
                fileInput.value = "";
            };

            reader.readAsText(file);
        });

        // INFO
        function showMetadata(data) {
            metadata.innerHTML = `<div>Verze: <b>${data.version}</b></div>
                                <div>Datum: <b>${data.date}</b></div>
                                <div>Autor: <b>${data.author}</b></div>
                                <div>${data.description}</div>`;
        }

        // TÉMATA
        function loadTopics() {
            topicSelect.innerHTML = `<option value="all">Všechna témata</option>`;
            let topics = [...new Set(allQuestions.map(q => q.topic))];

            topics.forEach(topic => {
                let option = document.createElement("option");
                option.value = topic;
                option.textContent = topic;
                topicSelect.appendChild(option);
            });
        }

        topicSelect.addEventListener("change", () => {
            answerSearch.value = "";
            startTest();
        });

        // START TESTU
        function startTest() {
            let topic = topicSelect.value;
            if (topic === "all") {
                questions = structuredClone(allQuestions);
            } else {
                questions = structuredClone(allQuestions.filter(q => q.topic === topic));
            }

            shuffle(questions);

            totalQuestions = questions.length;
            number = 0;
            correct = 0;
            wrong = 0;

            updateStats();
            showQuestion();
        }

        // ZOBRAZENÍ OTÁZKY
        function showQuestion() {
            questionBox.innerHTML = "";
            if (questions.length === 0) {
                info.innerHTML = "";
                questionBox.innerHTML = `<div class="card shadow-sm">
                                            <div class="card-body text-center p-4">
                                                <i class="bi bi-check-circle text-success fs-1"></i>
                                                <h5 class="mt-2">Hotovo</h5>
                                                <p class="text-muted">Všechny otázky byly dokončeny.</p>
                                            </div>
                                        </div>`;
                return;
            }

            currentQuestion = questions.shift();
            number++;
            topicBadge.textContent = currentQuestion.topic;
            info.innerHTML = `Otázka ${number}/${totalQuestions}<br>
                            Zbývá: ${questions.length + 1}`;

            progress.style.width = ((number - 1) / totalQuestions * 100) + "%";
            let card = document.createElement("div");
            card.className = "card shadow-sm";
            let body = document.createElement("div");
            body.className = "card-body";
            let title = document.createElement("h5");
            title.textContent = currentQuestion.question;
            title.className = "mb-3";
            body.appendChild(title);
            let answers = [
                currentQuestion.A,
                currentQuestion.B,
                currentQuestion.C
            ];

            shuffle(answers);

            let form = document.createElement("div");

            answers.forEach((text) => {
                let id = "answer_" + Math.random();
                let input = document.createElement("input");
                input.type = "radio";
                input.name = "answer";
                input.value = text;
                input.id = id;
                input.className = "answer-input";
                let label = document.createElement("label");
                label.htmlFor = id;
                label.className = "answer-label";
                label.textContent = text;
                form.appendChild(input);
                form.appendChild(label);
            });

            body.appendChild(form);

            let send = document.createElement("button");
            send.className = "btn btn-primary w-100 mt-2";
            send.innerHTML = `<i class="bi bi-check"></i>Odeslat`;
            send.onclick = () => checkAnswer(card);
            body.appendChild(send);
            card.appendChild(body);
            questionBox.appendChild(card);
        }

        // KONTROLA ODPOVĚDI
        function checkAnswer(card) {
            let selected = card.querySelector("input[name='answer']:checked");
            if (!selected) return;

            let correctText = currentQuestion[currentQuestion.correct];
            let isCorrect = false;
            let labels = card.querySelectorAll(".answer-label");

            labels.forEach(label => {
                let input = label.previousElementSibling;

                if (input.value === correctText) {
                    label.classList.add("show-correct");
                }

                if (input.checked) {
                    if (input.value === correctText) {
                        label.classList.remove("show-correct");
                        label.classList.add("correct");
                        isCorrect = true;
                    } else {
                        label.classList.add("wrong");
                    }
                }

                input.disabled = true;
            });

            card.querySelector("button").remove();

            if (isCorrect) {
                correct++;
            } else {
                wrong++;
                questions.push(currentQuestion);
            }

            updateStats();

            let next = document.createElement("button");
            next.className = "btn btn-outline-primary w-100 mt-2";
            next.innerHTML = `<i class="bi bi-arrow-right"></i> Další otázka`;
            next.onclick = () => showQuestion();

            card.querySelector(".card-body").appendChild(next);
        }

        function updateStats() {
            let done = correct + wrong;
            let percent = 0;
            if (done) {
                percent = Math.round((correct / done) * 100);
            }

            stats.innerHTML = `
        <i class="bi bi-check-circle text-success"></i> Správně: ${correct}
        &nbsp;|&nbsp;
        <i class="bi bi-x-circle text-danger"></i> Špatně: ${wrong}
        &nbsp;|&nbsp;
        Úspěšnost: ${percent}%
    `;
        }

        // SPRÁVNÉ ODPOVĚDI
        showAnswersBtn.addEventListener("click", () => {
            testPanel.classList.add("d-none");
            answersPanel.classList.remove("d-none");
            answerSearch.value = "";
            showCorrectAnswers();
        });

        // OKAMŽITÉ HLEDÁNÍ
        answerSearch.addEventListener("input", () => {
            showCorrectAnswers();
        });

        function showCorrectAnswers() {
            answersList.innerHTML = "";

            let topic = topicSelect.value;
            let list;

            if (topic === "all") {
                list = allQuestions;
            } else {
                list = allQuestions.filter(q => q.topic === topic);
            }

            let search = answerSearch.value.toLowerCase().trim();

            if (search) {
                list = list.filter(q => q.question.toLowerCase().includes(search));
            }

            if (list.length === 0) {
                answersList.innerHTML = `
            <div class="text-center text-muted p-3">
                <i class="bi bi-search fs-3"></i><br>
                Nenalezena žádná otázka
            </div>
        `;
                return;
            }

            list.forEach((q, index) => {
                let item = document.createElement("div");
                item.className = "list-group-item rounded mb-2";
                item.innerHTML = `
            <div class="fw-bold mb-2">${index + 1}. ${q.question}</div>
            <div class="text-success">
                <i class="bi bi-check-circle"></i> ${q[q.correct]}
            </div>
        `;
                answersList.appendChild(item);
            });
        }

        // ZPĚT NA TEST
        backBtn.addEventListener("click", () => {
            answersPanel.classList.add("d-none");
            testPanel.classList.remove("d-none");
        });

        // DARK MODE
        themeBtn.addEventListener("click", () => {
            document.body.classList.toggle("dark");
            document.body.classList.toggle("bg-light");
            document.body.classList.toggle("bg-dark");

            let icon = themeBtn.querySelector("i");

            if (document.body.classList.contains("dark")) {
                icon.className = "bi bi-sun";
            } else {
                icon.className = "bi bi-moon";
            }
        });

        // PROMÍCHÁNÍ
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        }
    </script>

</body>

</html>
